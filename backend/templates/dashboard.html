<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port AGV Digital Twin Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet.heat plugin for heatmap -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 320px;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        #sidebar h1 {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }

        .info-section {
            margin-bottom: 25px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .info-section h2 {
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #4CAF50;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .info-label {
            color: #aaa;
        }

        .info-value {
            color: #fff;
            font-weight: 600;
        }

        .risk-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .risk-low { background: #4CAF50; color: white; }
        .risk-medium { background: #FFC107; color: black; }
        .risk-high { background: #F44336; color: white; }

        .controls {
            margin-top: 20px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-group label:hover {
            background: #2a2a2a;
        }

        .control-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .legend {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
        }

        .legend h3 {
            font-size: 1em;
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 30px;
            height: 15px;
            margin-right: 10px;
            border-radius: 3px;
        }

        #map {
            flex: 1;
            height: 100vh;
        }

        .connection-status {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-bottom: 15px;
            text-align: center;
        }

        .status-connected {
            background: #4CAF50;
            color: white;
        }

        .status-disconnected {
            background: #F44336;
            color: white;
        }

        .status-connecting {
            background: #FFC107;
            color: black;
        }

        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: 40vh;
            }

            body {
                flex-direction: column;
            }

            #map {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>🚛 AGV Digital Twin</h1>

        <div id="connectionStatus" class="connection-status status-connecting">
            Connecting...
        </div>

        <div class="info-section">
            <h2>Vehicle Pose</h2>
            <div class="info-item">
                <span class="info-label">X Position:</span>
                <span class="info-value" id="posX">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">Y Position:</span>
                <span class="info-value" id="posY">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">Heading:</span>
                <span class="info-value" id="heading">--</span>
            </div>
        </div>

        <div class="info-section">
            <h2>Vehicle Status</h2>
            <div class="info-item">
                <span class="info-label">Speed:</span>
                <span class="info-value" id="speed">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">Risk Index:</span>
                <span class="info-value" id="riskIndex">
                    <span class="risk-indicator risk-low">LOW</span>
                </span>
            </div>
        </div>

        <div class="info-section">
            <h2>Scenario</h2>
            <div class="info-item">
                <span class="info-value" id="scenario">Standard Operation</span>
            </div>
        </div>

        <div class="controls">
            <h2 style="color: #4CAF50; margin-bottom: 15px;">Map Layers</h2>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="toggleTrajectory" checked>
                    <span>Show Trajectory</span>
                </label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="toggleHeatmap" checked>
                    <span>Show Risk Heatmap</span>
                </label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="toggleGrid">
                    <span>Show Grid</span>
                </label>
            </div>
        </div>

        <div class="legend">
            <h3>Risk Levels</h3>
            <div class="legend-item">
                <div class="legend-color" style="background: #4CAF50;"></div>
                <span>Low Risk (0.0 - 0.3)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FFC107;"></div>
                <span>Medium Risk (0.3 - 0.7)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #F44336;"></div>
                <span>High Risk (0.7 - 1.0)</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // Configuration
        const CONFIG = {
            mapCenter: [1.2821, 103.858], // Singapore coordinates
            mapZoom: 16,
            backendUrl: 'http://localhost:5000',
            maxTrajectoryPoints: 500
        };

        // Initialize Leaflet map
        const map = L.map('map').setView(CONFIG.mapCenter, CONFIG.mapZoom);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // Create custom AGV icon
        const agvIcon = L.divIcon({
            className: 'agv-marker',
            html: `<div style="
                width: 30px;
                height: 30px;
                background: #4CAF50;
                border: 3px solid white;
                border-radius: 50%;
                box-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            ">🚛</div>`,
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        // Map layers
        let agvMarker = null;
        let trajectoryPolyline = null;
        let heatmapLayer = null;
        let gridLayer = null;
        let trajectoryPoints = [];

        // Socket.IO connection
        let socket = null;

        // Initialize trajectory polyline
        trajectoryPolyline = L.polyline([], {
            color: '#2196F3',
            weight: 3,
            opacity: 0.7
        }).addTo(map);

        // Helper: Convert x,y to lat/lng (adjust based on your coordinate system)
        function xyToLatLng(x, y) {
            // Simple offset conversion - adjust these values based on your simulation area
            const latOffset = 0.0001;
            const lngOffset = 0.0001;
            return [
                CONFIG.mapCenter[0] + (y * latOffset),
                CONFIG.mapCenter[1] + (x * lngOffset)
            ];
        }

        // Helper: Get risk class based on value
        function getRiskClass(risk) {
            if (risk < 0.3) return 'risk-low';
            if (risk < 0.7) return 'risk-medium';
            return 'risk-high';
        }

        // Helper: Get risk label
        function getRiskLabel(risk) {
            if (risk < 0.3) return 'LOW';
            if (risk < 0.7) return 'MEDIUM';
            return 'HIGH';
        }

        // Update connection status UI
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'connection-status';

            switch(status) {
                case 'connected':
                    statusEl.classList.add('status-connected');
                    statusEl.textContent = '✓ Connected';
                    break;
                case 'disconnected':
                    statusEl.classList.add('status-disconnected');
                    statusEl.textContent = '✗ Disconnected';
                    break;
                case 'connecting':
                    statusEl.classList.add('status-connecting');
                    statusEl.textContent = '⟳ Connecting...';
                    break;
            }
        }

        // Socket.IO: Connect and handle real-time pose updates
        function connectSocketIO() {
            updateConnectionStatus('connecting');

            socket = io(CONFIG.backendUrl, {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('Socket.IO connected');
                updateConnectionStatus('connected');
            });

            socket.on('vehicle_pose', (data) => {
                updateVehiclePose(data);
            });

            socket.on('connect_error', (error) => {
                console.error('Socket.IO connection error:', error);
                updateConnectionStatus('disconnected');
            });

            socket.on('disconnect', () => {
                console.log('Socket.IO disconnected');
                updateConnectionStatus('disconnected');
            });
        }

        // Update vehicle pose from WebSocket data
        function updateVehiclePose(data) {
            const { x, y, heading, risk } = data;
            const latLng = xyToLatLng(x, y);

            // Update or create AGV marker
            if (!agvMarker) {
                agvMarker = L.marker(latLng, { icon: agvIcon }).addTo(map);
                agvMarker.bindPopup('AGV Vehicle');
            } else {
                agvMarker.setLatLng(latLng);
            }

            // Rotate marker based on heading (if needed)
            if (agvMarker._icon) {
                agvMarker._icon.style.transform += ` rotate(${heading}deg)`;
            }

            // Update trajectory
            trajectoryPoints.push(latLng);
            if (trajectoryPoints.length > CONFIG.maxTrajectoryPoints) {
                trajectoryPoints.shift();
            }
            trajectoryPolyline.setLatLngs(trajectoryPoints);

            // Update sidebar info
            document.getElementById('posX').textContent = x.toFixed(2) + ' m';
            document.getElementById('posY').textContent = y.toFixed(2) + ' m';
            document.getElementById('heading').textContent = heading.toFixed(1) + '°';

            const riskClass = getRiskClass(risk);
            const riskLabel = getRiskLabel(risk);
            document.getElementById('riskIndex').innerHTML =
                `<span class="risk-indicator ${riskClass}">${riskLabel} (${risk.toFixed(2)})</span>`;
        }

        // REST API: Fetch vehicle state
        async function fetchVehicleState() {
            try {
                const response = await fetch(`${CONFIG.backendUrl}/vehicle_state`);
                const data = await response.json();

                if (data.speed !== undefined) {
                    document.getElementById('speed').textContent = data.speed.toFixed(2) + ' m/s';
                }

                if (data.scenario) {
                    document.getElementById('scenario').textContent = data.scenario;
                }
            } catch (error) {
                console.error('Error fetching vehicle state:', error);
            }
        }

        // REST API: Fetch and display trajectory history
        async function fetchTrajectory() {
            try {
                const response = await fetch(`${CONFIG.backendUrl}/trajectory`);
                const data = await response.json();

                if (Array.isArray(data)) {
                    trajectoryPoints = data.map(point => xyToLatLng(point.x, point.y));
                    trajectoryPolyline.setLatLngs(trajectoryPoints);
                }
            } catch (error) {
                console.error('Error fetching trajectory:', error);
            }
        }

        // REST API: Fetch and display risk heatmap
        async function fetchHeatmap() {
            try {
                const response = await fetch(`${CONFIG.backendUrl}/risk/heatmap`);
                const data = await response.json();

                // Remove existing heatmap
                if (heatmapLayer) {
                    map.removeLayer(heatmapLayer);
                }

                // Process heatmap data
                let heatmapData = [];

                if (data.type === 'FeatureCollection') {
                    // GeoJSON format
                    data.features.forEach(feature => {
                        const coords = feature.geometry.coordinates;
                        const risk = feature.properties.risk || 0.5;
                        heatmapData.push([coords[1], coords[0], risk]);
                    });
                } else if (Array.isArray(data)) {
                    // Array format: [{x, y, risk}]
                    heatmapData = data.map(point => {
                        const latLng = xyToLatLng(point.x, point.y);
                        return [...latLng, point.risk || 0.5];
                    });
                }

                // Create heatmap layer
                if (heatmapData.length > 0) {
                    heatmapLayer = L.heatLayer(heatmapData, {
                        radius: 25,
                        blur: 15,
                        maxZoom: 17,
                        max: 1.0,
                        gradient: {
                            0.0: '#4CAF50',
                            0.3: '#8BC34A',
                            0.5: '#FFC107',
                            0.7: '#FF9800',
                            1.0: '#F44336'
                        }
                    }).addTo(map);
                }
            } catch (error) {
                console.error('Error fetching heatmap:', error);
            }
        }

        // Create grid overlay
        function createGrid() {
            if (gridLayer) {
                map.removeLayer(gridLayer);
            }

            const bounds = map.getBounds();
            const gridLines = [];

            // Create vertical and horizontal grid lines
            const step = 0.001; // Adjust grid spacing

            for (let lat = Math.floor(bounds.getSouth() / step) * step;
                 lat <= bounds.getNorth(); lat += step) {
                gridLines.push([
                    [lat, bounds.getWest()],
                    [lat, bounds.getEast()]
                ]);
            }

            for (let lng = Math.floor(bounds.getWest() / step) * step;
                 lng <= bounds.getEast(); lng += step) {
                gridLines.push([
                    [bounds.getSouth(), lng],
                    [bounds.getNorth(), lng]
                ]);
            }

            gridLayer = L.polyline(gridLines, {
                color: '#666',
                weight: 1,
                opacity: 0.3
            });
        }

        // Layer toggle controls
        document.getElementById('toggleTrajectory').addEventListener('change', (e) => {
            if (e.target.checked) {
                map.addLayer(trajectoryPolyline);
            } else {
                map.removeLayer(trajectoryPolyline);
            }
        });

        document.getElementById('toggleHeatmap').addEventListener('change', (e) => {
            if (e.target.checked && heatmapLayer) {
                map.addLayer(heatmapLayer);
            } else if (heatmapLayer) {
                map.removeLayer(heatmapLayer);
            }
        });

        document.getElementById('toggleGrid').addEventListener('change', (e) => {
            if (e.target.checked) {
                createGrid();
                map.addLayer(gridLayer);
            } else if (gridLayer) {
                map.removeLayer(gridLayer);
            }
        });

        // Initialize dashboard
        async function initialize() {
            console.log('Initializing AGV Dashboard...');

            // Connect Socket.IO for real-time updates
            connectSocketIO();

            // Fetch initial data
            await fetchVehicleState();
            await fetchTrajectory();
            await fetchHeatmap();

            // Periodic updates for REST endpoints
            setInterval(fetchVehicleState, 5000); // Update every 5 seconds
            setInterval(fetchHeatmap, 30000); // Update heatmap every 30 seconds
        }

        // Start the dashboard
        initialize();
    </script>
</body>
</html>
