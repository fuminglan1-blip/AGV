scene:
  name: simplified_port_agv_terrain_400m
  frame_id: world
  world_name: demo
  ground_plane_size_m: [400.0, 400.0]
  notes:
    - "Serves the current agv_ackermann + /agv/* runtime path."
    - "Zone A/B/C are parameterized here for reuse by Gazebo, risk logic, and UI overlays."
    - "Current SDF maps Zone A/B/C onto the unified test_corridor_terrain collision mesh."

corridors:
  main_test_corridor:
    centerline_xy:
      - [-120.0, 10.0]
      - [120.0, 10.0]
    width_m: 12.0
    purpose: straight_repeatability

  secondary_test_corridor:
    centerline_xy:
      - [-120.0, -40.0]
      - [120.0, -40.0]
    width_m: 12.0
    purpose: repeat_pass_and_recovery

  connector_lane:
    polyline_xy:
      - [120.0, 10.0]
      - [120.0, -40.0]
      - [-120.0, -40.0]
    width_m: 12.0
    purpose: closed_loop

zones:
  zone_A:
    name: zone_A_uniform_settlement
    type: uniform_settlement
    shape: rectangle
    center_xy: [-20.0, 10.0]
    size_m: [40.0, 14.0]
    elevation_delta_m: -0.05
    implementation: physical_terrain_tessellated_collision
    terrain_model: test_corridor_terrain
    terrain_transition_band_m: [5.0, 2.0]
    world_marker_model: zone_a_uniform_settlement_marker

  zone_B:
    name: zone_B_differential_slope
    type: differential_settlement
    shape: rectangle_gradient
    center_xy: [35.0, 10.0]
    size_m: [50.0, 14.0]
    left_edge_delta_z_m: 0.0
    right_edge_delta_z_m: -0.08
    implementation: physical_terrain_tessellated_collision
    terrain_model: test_corridor_terrain
    terrain_transition_band_m: [4.0, 2.0]
    slope_axis: +x
    low_shelf_width_m: 4.0
    recovery_width_m: 4.0
    world_marker_model: zone_b_differential_slope_marker

  zone_C:
    name: zone_C_local_trap
    type: local_sudden_drop
    shape: circle
    center_xy: [0.0, -40.0]
    radius_m: 2.0
    depth_m: 0.10
    implementation: physical_terrain_tessellated_collision
    terrain_model: test_corridor_terrain
    terrain_influence_radius_m: 2.5
    world_marker_model: zone_c_local_trap_marker

