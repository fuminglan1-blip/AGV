# demo_routes.yaml — Predefined waypoint routes for experiment demos
#
# Each route is a list of [x, y] waypoints in Gazebo coordinates.
# The mission controller drives to each waypoint in sequence.
#
# agv_ackermann spawns at (20, 12) in simplified_port_agv_terrain_400m.sdf.
# Coordinates stay within the 400 m experiment scene's test corridors.
#
# Waypoint tracking parameters (used by agv_mission_controller):
waypoint_tracking:
  arrive_radius: 1.5       # meters — switch to next waypoint when within this
  speed: 1.0               # m/s — cruise speed during mission
  slow_radius: 3.0         # meters — start slowing when within this
  slow_speed: 0.5          # m/s — speed when close to waypoint
  heading_tolerance: 0.3   # rad (~17°) — acceptable heading error before driving

demo_routes:
  # Standard port operation: straight run along the quay
  standard_operation:
    description: "Main-corridor run with loop return in the 400m experiment scene"
    waypoints:
      - [20.0, 12.0]
      - [0.0, 10.0]
      - [60.0, 10.0]
      - [120.0, 10.0]
      - [120.0, -40.0]
      - [20.0, -40.0]
      - [-60.0, -40.0]
      - [-20.0, 10.0]
      - [20.0, 12.0]

  # Deformation test: weaving path to test steering response
  deformation_test:
    description: "Zone A/B/C repeated pass route for localization and terrain tests"
    waypoints:
      - [20.0, 12.0]
      - [-40.0, 10.0]
      - [-20.0, 10.0]
      - [35.0, 10.0]
      - [80.0, 10.0]
      - [120.0, 10.0]
      - [120.0, -40.0]
      - [20.0, -40.0]
      - [0.0, -40.0]
      - [20.0, 12.0]

  # Avoidance demo: route around obstacles
  avoidance_demo:
    description: "Closed-loop route around crane and container landmarks"
    waypoints:
      - [20.0, 12.0]
      - [80.0, 10.0]
      - [120.0, 10.0]
      - [120.0, -40.0]
      - [40.0, -40.0]
      - [-40.0, -40.0]
      - [-80.0, -20.0]
      - [-60.0, 10.0]
      - [20.0, 12.0]
