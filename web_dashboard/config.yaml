# Web Dashboard Configuration

# Flask Server
server:
  # Bind to loopback by default so manual control endpoints stay local-only.
  # Change to 0.0.0.0 only when you explicitly need remote access.
  host: "127.0.0.1"
  port: 5000
  debug: false

# ROS2 Integration
# Primary vehicle runtime chain
#   agv_ackermann: /agv/odometry
ros2:
  topic: "/agv/odometry"
  message_type: "nav_msgs/msg/Odometry"
  node_name: "agv_pose_subscriber"

# Vehicle State
vehicle:
  max_trajectory_points: 500
  default_risk_index: 0.1
  default_scenario: "Standard Operation"

# Scene Profile
scene:
  profile: "simplified_port_agv_terrain_400m"
  title_cn: "400m 极简实验港口场景"
  description_cn: "定位误差与地形/形变感知验证主场景"
  default_gazebo_launch: "simplified_port_agv_terrain_400m.launch.py"
  legacy_gazebo_launch: "harbour_diff_drive.launch.py"
  world_size_m: [400.0, 400.0]
  local_map_bounds:
    min_x: -200.0
    max_x: 200.0
    min_y: -200.0
    max_y: 200.0
  deformation_zones_file: "../ros_gz_project_template/ros_gz_example_bringup/config/deformation_zones.yaml"
  risk_layer_mode: "synthetic_compat_deformation_yaml"

# Map Configuration
map:
  # Tile provider: 'simple' (default) | 'osm' | 'carto'
  # simple = CRS.Simple 仿真平面坐标 (无需网络/key)
  # osm    = OpenStreetMap 瓦片 (需联网)
  # carto  = CartoDB 暗色瓦片 (需联网)
  # 可在浏览器 URL 添加 ?provider=osm 临时切换
  provider: simple

  # 地理坐标锚点 (osm/carto 模式使用, 仿真原点映射到此处)
  center_lat: 1.2821
  center_lng: 103.858
  default_zoom: 16

  # Coordinate conversion (adjust based on your simulation scale)
  lat_offset: 0.0001
  lng_offset: 0.0001

# Risk Heatmap
heatmap:
  grid_size: 20
  simulation_area_size: 400.0  # meters
  grid_resolution_m: 1.0
