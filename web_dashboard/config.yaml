# Web Dashboard Configuration

# Flask Server
server:
  host: "0.0.0.0"
  port: 5000
  debug: false

# ROS2 Integration
# Active vehicle: change topic to switch between vehicles
#   agv_ackermann (default):  /agv/odometry
#   diff_drive (fallback):    /diff_drive/odometry
ros2:
  topic: "/agv/odometry"
  message_type: "nav_msgs/msg/Odometry"
  node_name: "agv_pose_subscriber"

# Vehicle State
vehicle:
  max_trajectory_points: 500
  default_risk_index: 0.1
  default_scenario: "Standard Operation"

# Map Configuration
map:
  # Tile provider: 'simple' (default) | 'osm' | 'carto'
  # simple = CRS.Simple 仿真平面坐标 (无需网络/key)
  # osm    = OpenStreetMap 瓦片 (需联网)
  # carto  = CartoDB 暗色瓦片 (需联网)
  # 可在浏览器 URL 添加 ?provider=osm 临时切换
  provider: simple

  # 地理坐标锚点 (osm/carto 模式使用, 仿真原点映射到此处)
  center_lat: 1.2821
  center_lng: 103.858
  default_zoom: 16

  # Coordinate conversion (adjust based on your simulation scale)
  lat_offset: 0.0001
  lng_offset: 0.0001

# Risk Heatmap
heatmap:
  grid_size: 20
  simulation_area_size: 100.0  # meters
